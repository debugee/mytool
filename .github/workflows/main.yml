name: Build and Release
permissions:
  contents: write
  packages: write
on:
  push:
    tags:
      - "*"
jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      USERNAME: debugee
      VCPKG_EXE: ${{ github.workspace }}/vcpkg/vcpkg
      FEED_URL: https://nuget.pkg.github.com/debugee/index.json
      VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/debugee/index.json,readwrite"
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Get Tag name
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          REPO_NAME=${GITHUB_REPOSITORY#*/}
          REPO_OWNER=${GITHUB_REPOSITORY%/*}
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "REPO_OWNER=$REPO_OWNER" >> $GITHUB_ENV

      - name: Calculate GitHub tarball SHA256
        run: |
          TAG=${{ env.TAG }}
          REPO_NAME=${{ env.REPO_NAME }}
          SHA=$(git archive \
            --format=tar.gz \
            --prefix="${REPO_NAME}-${TAG}/" \
            "$TAG" | shasum -a 256 | awk '{print $1}')
          echo "SHA=$SHA" >> $GITHUB_ENV

      - name: Configure
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE:STRING=Release

      - name: Package
        run: |
          cmake --build build --target package --config Release

      - name: Generate brew formula
        run: |
          cmake \
            -DGITHUB_OWNER=${{ env.REPO_OWNER }} \
            -DGITHUB_REPO=${{ env.REPO_NAME }} \
            -DTAG=${{ env.TAG }} \
            -DSOURCE_SHA256=${{ env.SHA }} \
            -P cmake/gen_brew_rb.cmake

      - name: Publish formula to tap
        if: startsWith(github.ref, 'refs/tags/')
        env:
          PUBLISH_TOKEN: ${{ secrets.BREW }}
          TAP_REPO: debugee/homebrew-mytap
          GITHUB_WORKSPACE: ${{ github.workspace }}
          REPO_NAME: ${{ env.REPO_NAME }}
          TAG: ${{ env.TAG }}
        run: |
          set -euo pipefail
          echo "Cloning tap repository ${TAP_REPO}"
          git clone "https://x-access-token:${PUBLISH_TOKEN}@github.com/${TAP_REPO}.git" tap
          cd tap
          mkdir -p Formula
          SRC="${GITHUB_WORKSPACE}/build/${REPO_NAME}.rb"
          if [ -f "$SRC" ]; then
            cp -f "$SRC" "Formula/${REPO_NAME}.rb"
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git add "Formula/${REPO_NAME}.rb"
            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Update ${REPO_NAME} formula for ${TAG}"
              git push origin HEAD
            fi
          else
            echo "No ${REPO_NAME}.rb found at ${GITHUB_WORKSPACE}/build/ — skipping publish"
          fi

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body: "mytool release"
          files: |
            build/*.zip
            build/*.rb